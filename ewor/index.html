<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Finwiser — Application Materials · Chandrachuda Sarma</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, Arial, sans-serif;
      display: flex; flex-direction: column; background: #0f2557; color: #1a1a2e;
      -webkit-font-smoothing: antialiased; overflow: hidden;
    }

    /* ── top bar ── */
    .top {
      flex: 0 0 auto; background: #0f2557; color: #fff;
      padding: 11px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
      border-bottom: 3px solid transparent;
      border-image: linear-gradient(90deg, #2563eb, #f59e0b) 1;
    }
    .brand { font-weight: 800; font-size: 1.02rem; letter-spacing: 0.01em; white-space: nowrap; }
    .brand small { color: #a8c4f0; font-weight: 500; font-size: 0.78rem; margin-left: 8px; }
    @media (max-width: 560px) { .brand small { display: none; } }
    .openfull {
      flex: 0 0 auto; color: #cfe0fb; font-size: 0.76rem; text-decoration: none;
      border: 1px solid rgba(255,255,255,0.28); border-radius: 7px; padding: 5px 10px; white-space: nowrap;
    }
    .openfull:hover { background: rgba(255,255,255,0.12); color: #fff; }

    /* ── horizontal scrolling link strip ── */
    .strip {
      flex: 0 0 auto; display: flex; gap: 8px; overflow-x: auto; white-space: nowrap;
      padding: 10px 14px; background: #fff; border-bottom: 1px solid #e4e8f0;
      -webkit-overflow-scrolling: touch; scrollbar-width: thin;
    }
    .strip::-webkit-scrollbar { height: 6px; }
    .strip::-webkit-scrollbar-thumb { background: #c4cde0; border-radius: 6px; }
    .chip {
      flex: 0 0 auto; border: 1px solid #d8deea; background: #f4f6fb; color: #0f2557;
      border-radius: 999px; padding: 8px 15px; font-size: 0.86rem; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: background .12s, color .12s, border-color .12s;
      font-family: inherit;
    }
    .chip:hover { border-color: #2563eb; }
    .chip.active { background: #0f2557; color: #fff; border-color: #0f2557; }

    /* ── viewer pane ── */
    .viewer { flex: 1 1 auto; min-height: 0; background: #525659; position: relative; }
    .viewer iframe { width: 100%; height: 100%; border: 0; display: block; }
    .hint {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      background: rgba(15,37,87,0.85); color: #cfe0fb; font-size: 0.74rem;
      padding: 6px 12px; border-radius: 8px; pointer-events: none; opacity: 0; transition: opacity .3s;
    }
  </style>
</head>
<body>
  <div class="top">
    <div class="brand">Finwiser <small>· Chandrachuda Sarma · Founder · Application Materials</small></div>
    <a class="openfull" id="openfull" href="/founder-pitch.mp4" target="_blank" rel="noopener">Open in full ↗</a>
  </div>

  <nav class="strip" id="strip" aria-label="Materials">
    <button class="chip active" data-src="/founder-pitch.mp4"               data-id="pitch">🎤 Founder Pitch</button>
    <button class="chip"        data-src="/ewor/demo.mp4"                   data-id="demo">▶️ Demo Video</button>
    <button class="chip"        data-src="/demo-app/"                       data-id="app">📱 Get the App</button>
    <button class="chip"        data-src="/codebase/explorer.html"          data-id="code">💻 Codebase</button>
    <button class="chip"        data-src="/ewor/technical-documentation.pdf" data-id="tech">📄 Technical Doc</button>
    <button class="chip"        data-src="/credentials/finwiser-credentials.pdf" data-id="creds">🏛️ Credentials</button>
    <button class="chip"        data-src="/fw-deck-2026/"                    data-id="deck">📊 Pitch Deck</button>
  </nav>

  <main class="viewer">
    <iframe id="frame" title="Material viewer" src="/founder-pitch.mp4" allow="fullscreen; encrypted-media" allowfullscreen></iframe>
  </main>

  <script>
    (function () {
      var frame = document.getElementById('frame');
      var openfull = document.getElementById('openfull');
      var chips = Array.prototype.slice.call(document.querySelectorAll('.chip'));

      function activate(chip, push) {
        chips.forEach(function (c) { c.classList.remove('active'); });
        chip.classList.add('active');
        frame.src = chip.getAttribute('data-src');
        openfull.setAttribute('href', chip.getAttribute('data-src'));
        if (push) history.replaceState(null, '', '#' + chip.getAttribute('data-id'));
        chip.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
      }

      chips.forEach(function (c) {
        c.addEventListener('click', function () { activate(c, true); });
      });

      var hash = (location.hash || '').replace('#', '');
      var initial = chips.filter(function (c) { return c.getAttribute('data-id') === hash; })[0] || chips[0];
      activate(initial, false);
    })();
  </script>
</body>
</html>
