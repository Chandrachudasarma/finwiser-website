<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finwiser — Codebase</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0a0a1a;color:#e0e0e0;overflow:hidden}
body{display:flex;flex-direction:column}
.bar{display:flex;align-items:center;background:#16213e;border-bottom:1px solid #2a2a4e;padding:0 24px;flex:0 0 auto}
.brand{color:#8899aa;padding:14px 24px 14px 0;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;border-right:1px solid #2a2a4e;margin-right:8px}
.brand b{color:#e0e0e0;font-weight:600}
.tab{padding:14px 20px;cursor:pointer;color:#8899cc;border-bottom:2px solid transparent;font-size:13px;letter-spacing:0.02em;transition:color 0.15s,border-color 0.15s;user-select:none}
.tab:hover{color:#c0d0e0}
.tab.active{color:#fff;border-bottom-color:#3498db}
.tab .mod{color:#556;font-size:11px;margin-right:6px}
iframe{flex:1 1 auto;border:0;width:100%;background:#0a0a1a}
@media (max-width:640px){
  .bar{overflow-x:auto;padding:0 12px}
  .brand{display:none}
  .tab{padding:12px 14px;font-size:12px;white-space:nowrap}
}
</style>
</head>
<body>
<div class="bar">
  <div class="brand">Finwiser · <b>Codebase</b></div>
  <div class="tab active" data-src="explorer.html" data-key="overall">Overall</div>
  <div class="tab" data-src="ingestion.html" data-key="ingestion"><span class="mod">M1</span>Ingestion</div>
  <div class="tab" data-src="ledger.html" data-key="ledger"><span class="mod">M2</span>Ledger</div>
  <div class="tab" data-src="analysis.html" data-key="analysis"><span class="mod">M3</span>Analysis</div>
  <div class="tab" data-src="goals.html" data-key="goals"><span class="mod">M4</span>Goals</div>
</div>
<iframe id="view" src="explorer.html" title="Finwiser codebase view"></iframe>
<script>
(function(){
  var tabs=document.querySelectorAll('.tab');
  var view=document.getElementById('view');
  function activate(tab){
    tabs.forEach(function(t){t.classList.remove('active');});
    tab.classList.add('active');
    view.src=tab.dataset.src;
    history.replaceState(null,'','#'+tab.dataset.key);
  }
  tabs.forEach(function(tab){tab.addEventListener('click',function(){activate(tab);});});
  var hash=location.hash.replace('#','');
  if(hash){
    var target=document.querySelector('.tab[data-key="'+hash+'"]');
    if(target)activate(target);
  }
})();
</script>
</body>
</html>
